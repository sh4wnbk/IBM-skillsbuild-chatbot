  <!-- ╔══════════════════════════════════════════════════════════╗
       ║  JAVASCRIPT — ChatEngine (exact port of src/engine.py)  ║
       ╚══════════════════════════════════════════════════════════╝ -->
  <script>
  // ─────────────────────────────────────────────────────────────────────
  // AI Usage Statement:
  // ChatEngine is a direct JavaScript port of src/engine.py.
  // Scoring: score += keyword.length * intent.priority  (per matched kw)
  // Confidence: Math.min(rawScore / maxPossibleScore, 1.0)
  // Escalation: confidence < ESCALATION_THRESHOLD (0.25)
  // ─────────────────────────────────────────────────────────────────────

  class ChatEngine {
    constructor() {
      this.intents = this._buildIntents();
      this.maxScore = Math.max(
        ...this.intents.map(i => i.keywords.reduce((s, kw) => s + kw.length * i.priority, 0))
      );
      this.ESCALATION_THRESHOLD = 0.25;
      this.FRUSTRATION_SIGNALS = [
        "frustrated","frustrating","annoyed","angry","hate","stupid","broken",
        "terrible","awful","useless","doesnt work","doesn't work","not working",
        "nothing works","give up","i cant","i can't","impossible","ridiculous","this is bad",
      ];
    }

    /* Public API — mirrors ChatEngine.respond() */
    respond(userInput) {
      const trimmed = userInput.trim();
      if (!trimmed) {
        return this._makeResponse(
          "It looks like you sent an empty message. Try asking about lab access, watsonx.ai, badges, the course curriculum, or the SkillsBuild community.",
          "fallback", 0, [], true
        );
      }

      const norm = this._normalize(trimmed);

      if (this._detectFrustration(norm)) {
        return this._makeResponse(
          "I'm sorry you're having a tough time — that's completely understandable!\n\nFor hands-on technical issues, the fastest path to a human is the #lab-support channel on the IBM SkillsBuild Slack workspace. Please search existing threads before posting.",
          "frustration", 0, [], true
        );
      }

      const results = this._scoreInput(norm);
      if (!results.length) return this._fallback(norm);

      const top = results[0];
      const confidence = Math.min(top.score / this.maxScore, 1.0);
      const escalate = confidence < this.ESCALATION_THRESHOLD;
      let text = this._pick(top.intent.responses);
      if (escalate) text += "\n\n---\nStill stuck? Post in #lab-support on the IBM SkillsBuild Slack. Search existing threads first.";

      return this._makeResponse(text, top.intent.name, confidence, top.matched, escalate);
    }

    /* Mirrors _normalize */
    _normalize(text) {
      return text.toLowerCase().trim()
        .replace(/[^\w\s\-']/g, ' ')
        .replace(/\s+/g, ' ').trim();
    }

    /* Mirrors _detect_frustration */
    _detectFrustration(norm) {
      return this.FRUSTRATION_SIGNALS.some(s => norm.includes(s));
    }

    /* Mirrors _score_input — keyword.length * intent.priority */
    _scoreInput(norm) {
      return this.intents.map(intent => {
        let score = 0; const matched = [];
        for (const kw of intent.keywords) {
          if (norm.includes(kw)) { score += kw.length * intent.priority; matched.push(kw); }
        }
        return { intent, score, matched };
      }).filter(r => r.score > 0).sort((a, b) => b.score - a.score);
    }

    _pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    _makeResponse(text, intentName, confidence, matched, escalate) {
      return { text, intentName, confidence, matched, escalate };
    }

    _fallback(norm) {
      const alpha = norm.replace(/[^a-z]/g, '');
      const text = alpha.length < 3
        ? "I didn't quite catch that. I can help with: lab access, watsonx.ai, digital badges, the course catalog, or #lab-support Slack.\n\n---\nStill stuck? Post in #lab-support on the IBM SkillsBuild Slack."
        : "I'm not sure about that topic yet. I specialise in IBM SkillsBuild topics: lab access, watsonx.ai troubleshooting, badges, curriculum, and the Slack community.\n\nCould you rephrase or pick one of those areas?\n\n---\nStill stuck? Post in #lab-support on the IBM SkillsBuild Slack.";
      return this._makeResponse(text, "fallback", 0, [], true);
    }

    /* Mirrors _build_intents() */
    _buildIntents() {
      return [
        // ── access (priority 2) — Lab Orientation ──────────────────────
        { name: "access", priority: 2,
          keywords: [
            "login","log in","sign in","password","reset password","forgot password",
            "account","locked out","locked account","two-factor","2fa","authentication",
            "username","email verification","activate account","registration",
            "cloud environment","managed environment","no install","no local install",
            "install","python install","lab environment","lab access",
            "unable to access","cannot access",
          ],
          responses: [
            "IBM SkillsBuild labs run in a fully managed cloud environment — no local Python installation or software setup is required on your machine. Everything runs in the browser.\n\nIf you cannot access the lab, first try logging out and back in. For persistent login issues, visit the login page and use 'Forgot Password' to reset your credentials. Activation emails expire after 24 hours — check your spam folder.",
            "Your SkillsBuild lab environment is cloud-hosted, so you do not need to install Python, Jupyter, or any other software locally.\n\nFor account or access problems: clear your browser cache, disable VPN if active, and ensure cookies are enabled. If 2FA is failing, re-sync your authenticator app clock.",
          ],
        },
        // ── watsonx (priority 3) — watsonx.ai doc ──────────────────────
        { name: "watsonx", priority: 3,
          keywords: [
            "watsonx","watsonx.ai","403","403 forbidden","forbidden error","capacity",
            "capacity limit","server capacity","project token","api token","token expired",
            "token invalid","rate limit","quota","inference error","model inference",
            "prompt lab","foundation model","granite","generative ai","gen ai",
            "large language model","llm","prompt engineering",
            "natural language processing","nlp","watson",
          ],
          responses: [
            "Common watsonx.ai issues and fixes:\n\n• 403 Forbidden error: Your project API token has expired or lacks the correct IAM role. Regenerate your token in the IBM Cloud IAM console and update the project settings in watsonx.ai.\n\n• Capacity limit reached: IBM Watson servers are at peak load. Wait a few minutes and retry.\n\n• Project token issues: Ensure your token is scoped to the correct project ID. A mismatch causes silent auth failures.",
            "If you see a 403 Forbidden on watsonx.ai:\n1. Open IBM Cloud → Manage → Access (IAM) → API keys.\n2. Create a new API key or regenerate the existing one.\n3. In watsonx.ai → Project → Manage → Access Control, update the token.\n\nIf the error persists, the project may have hit its capacity quota. Wait 5–10 minutes and retry.",
            "watsonx.ai Prompt Lab tips:\n\n• If a foundation model (e.g. Granite) returns a timeout, reduce your max token count and retry.\n• Capacity errors are temporary — peak demand can cause delays of 2–5 minutes.\n• Always validate your project token scope before starting a lab session.",
          ],
        },
        // ── certification (priority 2) — Badges/Certs doc ──────────────
        { name: "certification", priority: 2,
          keywords: [
            "badge","digital badge","certificate","certification","credential","credly",
            "acclaim","earn badge","80 percent","80%","passing score","passing grade",
            "final score","final assessment","assessment score","48 hours","48h",
            "badge delay","completed course","course completion","linkedin","share badge",
            "verify certificate","proof of completion","transcript","exam","quiz",
          ],
          responses: [
            "IBM SkillsBuild badges and certificates:\n\n• Badges are issued through Credly within 48 hours of course completion — check your email (including spam) for an invitation.\n\n• You must achieve 80% or higher on the final assessment to earn a badge. The threshold is fixed and cannot be waived.\n\n• Once claimed on Credly, share your badge directly to LinkedIn with a single click.",
            "Haven't received your badge?\n\n1. Confirm you scored 80%+ on the final assessment.\n2. Check your spam folder for a Credly invitation.\n3. If it has been more than 48 hours, contact SkillsBuild support with a screenshot of your completion page.",
          ],
        },
        // ── curriculum (priority 1) — Curriculum Overview ───────────────
        { name: "curriculum", priority: 1,
          keywords: [
            "curriculum","course structure","module","modules","progression","learning path",
            "course outline","syllabus","what topics","course content","course overview",
            "lesson","lessons","unit","units","what do i learn","what will i learn",
            "prerequisites","beginner","advanced","intermediate",
          ],
          responses: [
            "IBM SkillsBuild courses are structured in sequential modules. Each module builds on the previous one.\n\nCourses typically include:\n• Concept lessons (videos + readings)\n• Hands-on labs in the managed cloud environment\n• Knowledge checks and a graded final assessment (80%+ to pass)\n\nCheck the course overview page for a full module list and prerequisites.",
            "The SkillsBuild curriculum is organised into progressive learning paths. Beginner paths require no prior experience; intermediate and advanced paths list prerequisites on their overview pages.",
          ],
        },
        // ── community (priority 2) — Community/Slack doc ────────────────
        { name: "community", priority: 2,
          keywords: [
            "slack","lab-support","#lab-support","community","help channel","support channel",
            "post question","ask question","search first","community rules","community guidelines",
            "where to ask","where do i ask","who to contact","technical support",
            "human support","live support","contact support",
          ],
          responses: [
            "For technical issues during SkillsBuild labs:\n\n1. Join the IBM SkillsBuild Slack workspace (link on your course page).\n2. Search the #lab-support channel — most common problems have already been answered.\n3. If unresolved, post with: course name, exact error message, and steps you already tried.\n\nCommunity rule: Search before posting.",
            "The IBM SkillsBuild community uses Slack for peer and instructor support. Primary channel: #lab-support.\n\nWhen posting, include:\n• Course and module name\n• Exact error message or screenshot\n• Steps you have already tried",
          ],
        },
      ];
    }
  }

  // ─────────────────────────────────────────────────────────────────────
  // Console test simulation (runs on load — verifiable in DevTools)
  // ─────────────────────────────────────────────────────────────────────
  (function runConsoleTests() {
    const engine = new ChatEngine();
    const cases = [
      { input: "I am getting a 403 forbidden error on watsonx.ai", expect: "watsonx" },
      { input: "I forgot my password",                              expect: "access"  },
      { input: "How do I get my Credly badge?",                    expect: "certification" },
      { input: "What modules does this course have?",              expect: "curriculum" },
      { input: "How do I use the lab-support channel?",            expect: "community" },
      { input: "This is so frustrating",                           expect: "frustration" },
      { input: "",                                                  expect: "fallback" },
      { input: "xkjqwzpvmb",                                       expect: "fallback" },
    ];
    console.group("🤖 ChatEngine — console test simulation");
    let passed = 0;
    cases.forEach(({ input, expect }) => {
      const r = engine.respond(input);
      const ok = r.intentName === expect;
      if (ok) passed++;
      console.log(
        `%c${ok ? "✅ PASS" : "❌ FAIL"}%c  intent=${r.intentName} conf=${(r.confidence*100).toFixed(0)}%  input="${input}"`,
        ok ? "color:green;font-weight:bold" : "color:red;font-weight:bold", "color:inherit"
      );
    });
    console.log(`\n${passed}/${cases.length} tests passed`);
    console.groupEnd();
  })();

  // ─────────────────────────────────────────────────────────────────────
  // UI
  // ─────────────────────────────────────────────────────────────────────
  const engine     = new ChatEngine();
  const chatWindow = document.getElementById('chat-window');
  const inputEl    = document.getElementById('user-input');


  function now() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function scrollBottom() {
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  /* ── Welcome message ── */

  /* ── Bot reply bubble ── */
  function appendBot(result) {
    const pct    = Math.round(result.confidence * 100);
    const isInfo = result.intentName !== 'fallback' && result.intentName !== 'frustration';

    const confBar = isInfo ? `
      <div class="mt-3 pt-3 border-t border-ibm-gray20">
        <div class="flex justify-between text-xs text-ibm-gray60 mb-1">
          <span class="font-medium">Confidence</span>
          <span class="font-mono">${pct}%</span>
        </div>
        <div class="h-1.5 bg-ibm-gray20 rounded-full overflow-hidden">
          <div class="h-full rounded-full transition-all duration-700 ease-out ${
            pct >= 50 ? 'bg-ibm-blue' : pct >= 25 ? 'bg-ibm-yellow' : 'bg-ibm-red'
          }" style="width:${pct}%"></div>
        </div>
      </div>` : '';

    const escalateBanner = result.escalate ? `
      <div class="mt-3 flex items-start gap-2 bg-ibm-yellow-10 border border-ibm-yellow rounded-lg px-3 py-2.5">
        <i data-lucide="triangle-alert" class="w-4 h-4 text-yellow-600 flex-shrink-0 mt-0.5"></i>
        <p class="text-xs text-yellow-800 leading-snug">
          Not totally sure about this one. If it doesn't help, the
          <strong class="font-semibold">#lab-support</strong>
          channel usually has a fast answer.
        </p>
      </div>` : '';

    const el = document.createElement('div');
    el.className = 'flex items-start gap-3 msg-enter';
    el.innerHTML = `
      <div class="w-9 h-9 rounded-full bg-ibm-blue flex items-center justify-center flex-shrink-0 mt-0.5 shadow">
        <i data-lucide="bot" class="w-4 h-4 text-white"></i>
      </div>
      <div class="flex flex-col gap-1.5 max-w-[85%] min-w-0">
        <div class="bg-white border border-ibm-gray20 rounded-2xl rounded-tl-none px-4 py-3 shadow-sm">
          <p class="text-sm text-ibm-gray90 leading-relaxed whitespace-pre-wrap break-words">${esc(result.text)}</p>
          ${confBar}
          ${escalateBanner}
        </div>
        <div class="flex items-center gap-2 pl-1">
          <span class="text-xs text-ibm-gray40">${now()}</span>
        </div>
      </div>`;
    chatWindow.appendChild(el);
    lucide.createIcons();
    scrollBottom();
  }

  /* ── Event handlers ── */
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
  }

  function handleSend() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    appendUser(text);
    const typing = appendTyping();
    setTimeout(() => {
      chatWindow.removeChild(typing);
      appendBot(engine.respond(text));
    }, 500);
  }

  function sendQuick(text) {
    inputEl.value = text;
    handleSend();
  }

  function resetChat() {
    chatWindow.innerHTML = '';
    appendWelcome();
    inputEl.focus();
  }

  /* ── Init ── */
  document.addEventListener('DOMContentLoaded', () => {
    lucide.createIcons();
    appendWelcome();
    inputEl.focus();
  });
  </script>

</body>
</html>
